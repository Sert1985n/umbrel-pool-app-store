name: Build Pool Custom Panel image

on:
  push:
    branches: [main]
    paths:
      - 'sert-umbrel-pool-custom-panel/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./sert-umbrel-pool-custom-panel
          file: ./sert-umbrel-pool-custom-panel/Dockerfile
          push: true
          tags: |
            ghcr.io/sert1985n/pool-custom-panel:latest
            ghcr.io/sert1985n/pool-custom-panel:${{ github.sha }}
