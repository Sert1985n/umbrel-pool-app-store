name: Build Pool Dashboard image

on:
  push:
    branches: [main]
    paths:
      - 'sert-umbrel-pool-dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sert-umbrel-pool-dashboard
          file: ./sert-umbrel-pool-dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/sert1985n/pool-dashboard:latest
            ghcr.io/sert1985n/pool-dashboard:${{ github.sha }}
