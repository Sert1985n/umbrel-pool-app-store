version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: sert-umbrel-pool-grs-node_web_1
      APP_PORT: 8080
  web:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node
  node:
    image: theretromike/nodes:groestlcoin
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.groestlcoin:/root/.groestlcoin
    ports:
      - 9013:9013
      - 7013:7013
    entrypoint: ["groestlcoind", "-printtoconsole", "-server", "-prune=550", "-wallet=default", "-zmqpubhashblock=tcp://127.0.0.1:7013", "-rpcbind=0.0.0.0", "-rpcport=9013", "-rpcallowip=0.0.0.0/0", "-rpcuser=pooluser", "-rpcpassword=poolpassword"]
