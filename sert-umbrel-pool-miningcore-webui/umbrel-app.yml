manifestVersion: 1
id: sert-umbrel-pool-miningcore-webui
name: MiningCore Web UI
tagline: Web UI for the MiningCore Mining Pool App (public-pool-btc.ru)
icon: https://cryptologos.cc/logos/bitcoin-btc-logo.svg
category: SOLO Crypto Mining
version: "2.5.0"
port: 8559
description: |
  Web UI for the MiningCore Mining Pool App. Pool Configuration, Setup Database Schema, Refresh Master Coin List, Generate Pool Config File. Install MiningCore first.

  public-pool-btc.ru
developer: Sert1985n
website: https://github.com/Sert1985n/umbrel-pool-app-store
