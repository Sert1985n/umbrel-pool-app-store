manifestVersion: 1
id: sert-umbrel-pool-miningcore-webui
name: MiningCore Web UI
tagline: Web UI for the MiningCore Mining Pool — Setup Database Schema, Refresh Master Coin List, Generate Pool Config File
icon: https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
category: SOLO Crypto Mining
version: "2.5.0"
port: 8559
description: |
  Родная панель MiningCore: Pool Configuration, Setup Database Schema, Refresh Master Coin List, Generate Pool Config File. Подключите coins.json и config.json на сервере (/home/umbrel/.miningcore/). Для работы с пулом установите MiningCore (приложения независимы).
developer: Sert1985n
website: https://github.com/Sert1985n/umbrel-pool-app-store
submitter: Sert1985n
submission: https://github.com/Sert1985n/umbrel-pool-app-store
repo: https://hub.docker.com/r/theretromike/miningcorewebui
support: https://github.com/Sert1985n/umbrel-pool-app-store
gallery:
  - https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
releaseNotes: |
  На базе Retro Mike MiningCore Web UI. Порт 8559. Referral/Support — в оригинальном образе; для своей панели используйте приложение «Pool Dashboard».
dependencies: []
widgets:
  - id: "page1"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/0"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
  - id: "page2"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/1"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
  - id: "page3"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/2"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
path: ""
defaultUsername: ""
defaultPassword: ""
