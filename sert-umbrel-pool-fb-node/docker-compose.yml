version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: sert-umbrel-pool-fb-node_web_1
      APP_PORT: 8080
  web:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node
  node:
    image: unisat/fractal:v29.1-v0.3.0rc2
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.fb:/data
    ports:
      - 9021:9021
      - 7021:7021
      - 8337:8337
    entrypoint: ["bitcoind", "-datadir=/data", "-printtoconsole", "-server", "-prune=550", "-wallet=default", "-port=8337", "-zmqpubhashblock=tcp://0.0.0.0:7021", "-rpcbind=0.0.0.0", "-rpcport=9021", "-rpcallowip=0.0.0.0/0", "-rpcuser=pooluser", "-rpcpassword=poolpassword"]
