version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sert-umbrel-pool-pool-config_gateway_1
      APP_PORT: 80
    depends_on:
      - gateway

  # Страница с кнопкой «Перезапустить MiningCore» и iframe панели
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: ghcr.io/sert1985n/pool-config-gateway:latest
    restart: on-failure
    depends_on:
      - web
      - restart-helper

  # Панель MiningCore Web UI (Setup DB, Refresh Coin List, Generate Config, Wallet)
  web:
    image: theretromike/miningcorewebui
    restart: on-failure
    volumes:
      - /home/umbrel/.miningcore:/app/miningcore
    user: "1000:1000"
    environment:
      - POOL_NAME=Self-Hosted Mining Pool
      - STRATUM_HOST=umbrel.local
      - API_BASE_URL=http://sert-umbrel-pool-miningcore_server_1:4000/api
      - PLATFORM=UMBREL
    depends_on:
      - coins-init

  # При первом запуске подставляет coins.json с нашими монетами (если файла ещё нет)
  coins-init:
    image: alpine:3.19
    volumes:
      - /home/umbrel/.miningcore:/data
    command: >
      sh -c "apk add --no-cache wget
      && (test -s /data/coins.json && echo 'coins.json exists' || wget -q -O /data/coins.json 'https://raw.githubusercontent.com/Sert1985n/umbrel-pool-app-store/main/templates/coins.json')
      && echo done"

  # Кнопка «Перезапустить MiningCore» дергает этот сервис (нужен доступ к docker.sock)
  restart-helper:
    build:
      context: ./restart-helper
      dockerfile: Dockerfile
    image: ghcr.io/sert1985n/pool-config-restart:latest
    restart: on-failure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MININGCORE_CONTAINER=sert-umbrel-pool-miningcore_server_1
