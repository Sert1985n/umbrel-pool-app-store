version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sert-umbrel-pool-poolui_server_1
      APP_PORT: 80
    depends_on:
      - server

  server:
    image: nginx:alpine
    restart: on-failure
    volumes:
      - ./poolui:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
