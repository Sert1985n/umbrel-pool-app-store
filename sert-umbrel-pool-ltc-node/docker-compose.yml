version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: sert-umbrel-pool-ltc-node_web_1
      APP_PORT: 8080
  web:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node
  node:
    image: theretromike/nodes:litecoin
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.litecoin:/root/.litecoin
    ports:
      - 9020:9020
      - 7020:7020
      - 9333:9333
    entrypoint: ["litecoind", "-printtoconsole", "-server", "-prune=2200", "-wallet=default", "-port=9333", "-zmqpubhashblock=tcp://0.0.0.0:7020", "-rpcbind=0.0.0.0", "-rpcport=9020", "-rpcallowip=0.0.0.0/0", "-rpcuser=pooluser", "-rpcpassword=poolpassword"]
